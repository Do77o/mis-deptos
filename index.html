<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,system-ui,sans-serif);background:var(--bg3);color:var(--tx1);font-size:15px;line-height:1.5}
:root{
  --pri:#4A9EE0;--pri-l:rgba(74,158,224,0.15);
  --suc:#6DB84A;--suc-l:rgba(109,184,74,0.15);
  --dan:#E06B6B;--dan-l:rgba(224,107,107,0.15);
  --war:#D4944A;--war-l:rgba(212,148,74,0.15);
  --bdr:rgba(255,255,255,0.1);
  --r:10px;--rs:7px;
  --bg1:#1C1C1E;--bg2:#2C2C2E;--bg3:#141414;
  --tx1:#F0F0F0;--tx2:#9A9A9E;
}
.app{display:flex;height:100vh;min-height:600px}
.sidebar{width:200px;min-width:200px;background:var(--bg2);border-right:0.5px solid var(--bdr);display:flex;flex-direction:column;padding:16px 0}
.sb-logo{padding:4px 16px 14px;border-bottom:0.5px solid var(--bdr);margin-bottom:8px}
.sb-logo h2{font-size:14px;font-weight:500}
.sb-logo p{font-size:12px;color:var(--tx2);margin-top:2px}
.nav{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:14px;color:var(--tx2);border-left:3px solid transparent;transition:all .15s}
.nav:hover{background:rgba(255,255,255,0.05);color:var(--tx1)}
.nav.active{background:rgba(74,158,224,0.15);color:var(--pri);border-left-color:var(--pri);font-weight:500}
.nav i{font-size:17px}
.main{flex:1;overflow-y:auto;padding:24px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.hdr h1{font-size:20px;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--rs);border:0.5px solid var(--bdr);background:var(--bg2);cursor:pointer;font-size:13px;color:var(--tx1);transition:all .15s}
.btn:hover{background:rgba(255,255,255,0.08)}
.btn-p{background:var(--pri);color:#fff;border-color:var(--pri)}.btn-p:hover{opacity:.9}
.btn-s{padding:5px 10px;font-size:12px}
.btn-d{background:var(--dan);color:#fff;border-color:var(--dan)}.btn-d:hover{opacity:.9}
.btn-w{background:var(--war-l);color:var(--war);border-color:var(--war)}.btn-w:hover{opacity:.8}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--bg2);border-radius:var(--r);padding:14px 16px}
.sc .lbl{font-size:12px;color:var(--tx2);margin-bottom:4px}
.sc .val{font-size:22px;font-weight:500}
.sc.d{background:var(--dan-l)}.sc.d .val{color:var(--dan)}
.sc.s{background:var(--suc-l)}.sc.s .val{color:var(--suc)}
.sc.w{background:var(--war-l)}.sc.w .val{color:var(--war)}
.card{background:var(--bg2);border-radius:var(--r);border:0.5px solid var(--bdr);margin-bottom:16px}
.ch{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:0.5px solid var(--bdr)}
.ch h3{font-size:14px;font-weight:500;display:flex;align-items:center;gap:7px}
.fg{display:grid;grid-template-columns:repeat(2,1fr);gap:0}
.dc{padding:12px 16px;border-bottom:0.5px solid var(--bdr);border-right:0.5px solid var(--bdr);cursor:pointer;transition:background .12s}
.dc:nth-child(even){border-right:none}
.dc.duplex{grid-column:1/-1;border-right:none}
.dc:hover{background:rgba(255,255,255,0.05)}
.dc .did{font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:2px}
.dc .dname{font-size:14px;font-weight:500}
.dc .dstat{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.bp{background:rgba(109,184,74,0.2);color:#8FD86A}.bu{background:rgba(224,107,107,0.2);color:#F08080}.bpa{background:rgba(212,148,74,0.2);color:#E0A870}.be{background:rgba(255,255,255,0.07);color:var(--tx2)}.bna{background:rgba(160,120,220,0.2);color:#C09AE8}
.b-ars{background:rgba(74,158,224,0.2);color:#7BC0F0}.b-usd{background:rgba(109,184,74,0.2);color:#8FD86A}
.b-largo{background:rgba(255,255,255,0.07);color:var(--tx2)}.b-corto{background:rgba(212,148,74,0.2);color:#E0A870}.b-local{background:rgba(74,158,224,0.2);color:#7BC0F0}
.fl{grid-column:1/-1;background:rgba(255,255,255,0.04);padding:7px 16px;font-size:12px;font-weight:500;color:var(--tx2);border-bottom:0.5px solid var(--bdr)}
.sm{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.sd{width:7px;height:7px;border-radius:50%;display:inline-block}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
.mb{background:var(--bg2);border-radius:var(--r);width:100%;max-width:680px;max-height:92vh;overflow-y:auto}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:0.5px solid var(--bdr);position:sticky;top:0;background:var(--bg2);z-index:1}
.mh h3{font-size:16px;font-weight:500}
.mbody{padding:18px 20px}
.mft{padding:12px 20px;border-top:0.5px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg2)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
label.fl2{display:block;font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fi{margin-bottom:14px}
.fi input,.fi select,.fi textarea{width:100%;padding:8px 10px;border:0.5px solid var(--bdr);border-radius:var(--rs);font-size:14px;background:var(--bg1);color:var(--tx1)}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:var(--pri)}
.st{font-size:11px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;margin:16px 0 10px;border-bottom:0.5px solid var(--bdr);padding-bottom:7px}
.cb{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;margin-bottom:8px}
.cb input{width:16px;height:16px;cursor:pointer}
.sr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid var(--bdr)}
.sr:last-child{border-bottom:none}
.si{display:flex;align-items:center;gap:10px}
.sn{font-size:14px;font-weight:500}
.sa{font-size:12px;color:var(--tx2)}
.dot-g{width:8px;height:8px;border-radius:50%;background:#6DB84A}
.ai{padding:14px 16px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:flex-start;gap:12px}
.ai:last-child{border-bottom:none}
.adot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
.at{font-size:14px;font-weight:500}
.am{font-size:12px;color:var(--tx2);margin-top:2px}
.aa{display:flex;gap:6px;align-items:center}
.cb2{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.ca{background:rgba(74,158,224,0.2);color:#7BC0F0}.cc{background:rgba(109,184,74,0.2);color:#8FD86A}.cca{background:rgba(212,148,74,0.2);color:#E0A870}.cp{background:rgba(224,107,107,0.2);color:#F08080}.cg{background:rgba(255,255,255,0.07);color:var(--tx2)}
.alert-i{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--bdr)}
.alert-i:last-child{border-bottom:none}
.aic{font-size:18px;margin-top:1px}
.atit{font-size:14px;font-weight:500}.adesc{font-size:12px;color:var(--tx2);margin-top:2px}
.ah .aic{color:var(--dan)}.am2 .aic{color:var(--war)}
.es{text-align:center;padding:28px 20px;color:var(--tx2)}
.es i{font-size:32px;display:block;margin-bottom:8px;opacity:.4}
.es p{font-size:14px}
.tb{display:flex;gap:2px;margin-bottom:16px;background:var(--bg1);border-radius:var(--rs);padding:3px}
.tab{padding:7px 14px;border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--tx2);transition:all .12s}
.tab.active{background:var(--bg2);color:var(--tx1);font-weight:500;border:0.5px solid var(--bdr)}
.fb{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.fb2{padding:5px 12px;border-radius:20px;border:0.5px solid var(--bdr);background:var(--bg2);cursor:pointer;font-size:12px;color:var(--tx2);transition:all .12s}
.fb2.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.fb2:hover:not(.active){background:rgba(255,255,255,0.07)}
input[type=date]{color-scheme:dark}
.de{background:rgba(74,158,224,0.15);color:#7BC0F0}.dm{background:rgba(212,148,74,0.15);color:#E0A870}.di{background:rgba(74,158,224,0.15);color:#4A9EE0}.df{background:rgba(109,184,74,0.15);color:#6DB84A}
.ipc-box{background:rgba(109,184,74,0.12);border:0.5px solid rgba(109,184,74,.25);border-radius:var(--rs);padding:12px 14px;margin-bottom:14px;font-size:13px}
.ipc-box .ipc-val{font-size:20px;font-weight:500;color:var(--suc);margin:4px 0 2px}
.ipc-box .ipc-sub{font-size:12px;color:var(--tx2)}
.usd-box{background:rgba(74,158,224,0.12);border:0.5px solid rgba(74,158,224,.2);border-radius:var(--rs);padding:12px 14px;margin-bottom:14px;font-size:13px}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:0.5px solid var(--bdr)}
.doc-item:last-child{border-bottom:none}
.doc-icon{font-size:20px;color:var(--pri)}
.doc-name{font-size:14px;font-weight:500;flex:1}
.doc-meta{font-size:12px;color:var(--tx2)}
.upload-area{border:1.5px dashed var(--bdr);border-radius:var(--rs);padding:20px;text-align:center;cursor:pointer;font-size:13px;color:var(--tx2);transition:border-color .15s}
.upload-area:hover{border-color:var(--pri);color:var(--pri)}
.nota-item{padding:12px 16px;border-bottom:0.5px solid var(--bdr)}
.nota-item:last-child{border-bottom:none}
.nota-text{font-size:14px}.nota-date{font-size:11px;color:var(--tx2);margin-top:3px}
.pv-card{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--r);margin-bottom:10px;cursor:pointer;transition:background .12s}
.pv-card:hover{background:rgba(255,255,255,0.04)}
.pv-header{display:flex;align-items:center;gap:12px;padding:14px 16px}
.pv-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.pv-info{flex:1;min-width:0}
.pv-name{font-size:14px;font-weight:500}
.pv-cat{font-size:12px;color:var(--tx2);margin-top:2px}
.pv-actions{display:flex;gap:6px}
.pv-detail{padding:0 16px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.pv-field{font-size:12px}.pv-field .lbl{color:var(--tx2);margin-bottom:2px}.pv-field .val{font-size:13px;font-weight:500;word-break:break-word}
.cat-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--bdr);background:var(--bg2);color:var(--tx2);transition:all .12s}
.cat-pill.active{color:#fff}
.cat-pill:hover:not(.active){background:rgba(255,255,255,0.07)}
/* FOTOS */
.foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.foto-thumb{position:relative;aspect-ratio:4/3;border-radius:var(--rs);overflow:hidden;background:var(--bg1);cursor:pointer;border:0.5px solid var(--bdr)}
.foto-thumb img{width:100%;height:100%;object-fit:cover;transition:opacity .15s}
.foto-thumb:hover img{opacity:.85}
.foto-thumb .foto-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;background:linear-gradient(transparent 40%,rgba(0,0,0,.7));opacity:0;transition:opacity .15s}
.foto-thumb:hover .foto-overlay{opacity:1}
.foto-caption{font-size:11px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.foto-del{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:opacity .15s}
.foto-thumb:hover .foto-del{opacity:1}
.foto-upload-area{border:1.5px dashed var(--bdr);border-radius:var(--rs);padding:20px;text-align:center;cursor:pointer;color:var(--tx2);transition:all .15s}
.foto-upload-area:hover{border-color:var(--pri);color:var(--pri)}
/* Lightbox */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column}
#lightbox img{max-width:90vw;max-height:82vh;border-radius:var(--rs);object-fit:contain}
#lightbox-caption{color:#fff;font-size:13px;margin-top:12px;opacity:.8}
#lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);display:flex;justify-content:space-between;width:100%;padding:0 16px;pointer-events:none}
.lb-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;cursor:pointer;pointer-events:all;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lb-btn:hover{background:rgba(255,255,255,.3)}
#lightbox-close{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gs-table{width:100%;border-collapse:collapse;font-size:13px}
.gs-table th{text-align:left;padding:8px 12px;font-size:11px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid var(--bdr);white-space:nowrap}
.gs-table td{padding:9px 12px;border-bottom:0.5px solid var(--bdr);vertical-align:middle}
.gs-table tr:last-child td{border-bottom:none}
.gs-table tr:hover td{background:rgba(255,255,255,0.03)}
.gs-monto{display:flex;align-items:center;gap:6px}
.gs-monto input{width:90px;padding:5px 8px;background:var(--bg1);border:0.5px solid var(--bdr);border-radius:var(--rs);font-size:13px;color:var(--tx1);text-align:right}
.gs-monto input:focus{outline:none;border-color:var(--pri)}
.gs-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;padding:4px 8px;border-radius:var(--rs);border:0.5px solid var(--bdr);background:var(--bg1);color:var(--tx2);transition:all .12s;white-space:nowrap}
.gs-toggle.pagado{background:rgba(109,184,74,0.15);border-color:rgba(109,184,74,.3);color:#8FD86A}
.gs-total{font-weight:500;font-size:13px}
.gs-total.pagado{color:#8FD86A}.gs-total.parcial{color:#E0A870}.gs-total.debe{color:#F08080}
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--bdr);font-size:13px}
.hist-row:last-child{border-bottom:none}
/* INFORMACIÓN */
.info-card{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--r);padding:16px}
.info-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.info-card-cat{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--tx2);margin-bottom:4px}
.info-card-title{font-size:14px;font-weight:500}
.info-card-body{font-size:13px;color:var(--tx2);white-space:pre-wrap;word-break:break-word;line-height:1.6}
.info-card-actions{display:flex;gap:5px;flex-shrink:0;margin-left:8px}
/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:14px;padding:36px 32px;width:100%;max-width:360px}
.login-box h2{font-size:20px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.login-box .sub{font-size:13px;color:var(--tx2);margin-bottom:28px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:11px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.login-field input{width:100%;padding:10px 12px;background:var(--bg1);border:0.5px solid var(--bdr);border-radius:var(--rs);font-size:14px;color:var(--tx1);outline:none;transition:border-color .15s}
.login-field input:focus{border-color:var(--pri)}
.login-btn{width:100%;padding:11px;background:var(--pri);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:500;cursor:pointer;margin-top:6px;transition:opacity .15s}
.login-btn:hover{opacity:.88}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:var(--dan);font-size:13px;margin-top:10px;min-height:18px;text-align:center}
.login-user{display:flex;align-items:center;gap:8px;padding:8px 12px;margin-top:auto;border-top:0.5px solid var(--bdr)}
.login-user span{font-size:12px;color:var(--tx2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--suc);flex-shrink:0}
.sync-dot.syncing{background:var(--war);animation:pulse .8s infinite alternate}
@keyframes pulse{from{opacity:.4}to{opacity:1}}
</style>
</head>
<body>
<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <h2><i class="ti ti-home-2" style="color:var(--pri)"></i> Mis Deptos</h2>
    <p class="sub">Acceso privado — ingresá con tu cuenta</p>
    <div class="login-field"><label>Email</label><input type="email" id="li-email" placeholder="tu@email.com" autocomplete="email"></div>
    <div class="login-field"><label>Contraseña</label><input type="password" id="li-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="login-btn" id="li-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="li-err"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()"><i class="ti ti-x"></i></button>
  <div id="lightbox-nav">
    <button class="lb-btn" onclick="event.stopPropagation();lbNav(-1)"><i class="ti ti-chevron-left"></i></button>
    <button class="lb-btn" onclick="event.stopPropagation();lbNav(1)"><i class="ti ti-chevron-right"></i></button>
  </div>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption"></div>
</div>

<div class="app" id="app" style="display:none">
  <aside class="sidebar">
    <div class="sb-logo">
      <h2><i class="ti ti-home-2" style="color:var(--pri)"></i> Mis Deptos</h2>
      <p id="sidebar-count">Cargando...</p>
    </div>
    <div class="nav active" onclick="sv('dashboard')" id="nav-dashboard"><i class="ti ti-layout-dashboard"></i> Panel</div>
    <div class="nav" onclick="sv('deptos')" id="nav-deptos"><i class="ti ti-home-2"></i> Departamentos</div>
    <div class="nav" onclick="sv('servicios')" id="nav-servicios"><i class="ti ti-plug"></i> Servicios</div>
    <div class="nav" onclick="sv('pagos')" id="nav-pagos"><i class="ti ti-cash"></i> Pagos</div>
    <div class="nav" onclick="sv('mantenimiento')" id="nav-mantenimiento"><i class="ti ti-tool"></i> Mantenimiento</div>
    <div class="nav" onclick="sv('informacion')" id="nav-informacion"><i class="ti ti-info-circle"></i> Información</div>
    <div class="nav" onclick="sv('agenda')" id="nav-agenda"><i class="ti ti-calendar-event"></i> Agenda</div>
    <div class="nav" onclick="sv('alertas')" id="nav-alertas"><i class="ti ti-bell"></i> Alertas <span id="abadge" style="margin-left:auto;background:var(--dan);color:#fff;border-radius:20px;padding:1px 7px;font-size:11px;display:none"></span></div>

// ======= REALTIME DB SYNC =======
function setSyncing(on){
  const dot = document.getElementById('sync-dot');
  if(dot) on ? dot.classList.add('syncing') : dot.classList.remove('syncing');
}

function startListening(){
  if(_listening) return;
  _listening = true;
  _dbRef = db.ref('state');
  setSyncing(true);

  // Single persistent listener — first call gives initial data, subsequent calls are live updates
  _dbRef.on('value', snap=>{
    const val = snap.val();
    if(!val){
      // First time ever — no data in Firebase yet
      initFreshState();
      pushToFirebase();
      setSyncing(false);
      updateSidebarCount();
      sv('dashboard');
      return;
    }
    try{
      const wasFirst = !S.deptos.length;
      S = {...S, ...normalizeFromFirebase(val)};
      migrateState();
      setSyncing(false);
      updateSidebarCount();
      if(wasFirst){
        // First load: navigate to dashboard
        sv('dashboard');
      } else {
        // Live update from other user: re-render only if no modal is open
        const modalOpen = document.getElementById('modal').style.display !== 'none';
        if(!modalOpen){ render(); updateBadge(); }
      }
    }catch(e){ console.error('Firebase data error',e); setSyncing(false); }
  }, e=>{ console.error('Firebase listener error',e); setSyncing(false); });
}

// Firebase stores arrays as objects {0:{...},1:{...}} — convert back to arrays
function toArr(val){
  if(!val) return [];
  if(Array.isArray(val)) return val;
  // Object with numeric-ish keys → array
  return Object.keys(val).sort((a,b)=>Number(a)-Number(b)).map(k=>val[k]);
}

function normalizeFromFirebase(val){
  const out = {...val};
  // deptos
  out.deptos = toArr(val.deptos).map(d=>{
    if(!d) return null;
    return {
      ...d,
      docs:   toArr(d.docs),
      docsServicios: toArr(d.docsServicios),
      docsMantenimiento: toArr(d.docsMantenimiento),
      fotos: toArr(d.fotos),
      notas:  toArr(d.notas),
      payments: d.payments||{},
      services: d.services||{},
      accounts: d.accounts||{},
      cochera:  d.cochera||{tiene:false,numero:'',precio:''},
      contract: d.contract||{type:'largo',currency:'ars',amount:'',startDate:'',durationMonths:24,lastUpdate:'',notes:''},
    };
  }).filter(Boolean);
  // agenda
  out.agenda = toArr(val.agenda);
  // customServices
  out.customServices = toArr(val.customServices);
  // proveedores
  out.proveedores = toArr(val.proveedores);
  // infoItems
  out.infoItems = toArr(val.infoItems);
  // svcCostos — nested object, keep as-is
  out.svcCostos = val.svcCostos||{};
  return out;
}

function pushToFirebase(){
  setSyncing(true);
  const slim = {
    ...S,
    deptos: S.deptos.map(d=>({
      ...d,
      docs: (d.docs||[]).map(doc=>({name:doc.name,date:doc.date,size:doc.size,url:doc.url||null,path:doc.path||null})),
      docsServicios: (d.docsServicios||[]).map(doc=>({name:doc.name,date:doc.date,size:doc.size,url:doc.url||null,path:doc.path||null})),
      docsMantenimiento: (d.docsMantenimiento||[]).map(doc=>({name:doc.name,date:doc.date,size:doc.size,url:doc.url||null,path:doc.path||null})),
      fotos: (d.fotos||[]).map(f=>({name:f.name,date:f.date,size:f.size,url:f.url||null,path:f.path||null,caption:f.caption||''})),
    }))
  };
  db.ref('state').set(slim)
    .then(()=>setSyncing(false))
    .catch(e=>{ setSyncing(false); console.error('Firebase write error',e); });
}

function save(){
  // Debounce: wait 800ms after last change before writing to Firebase
  // This prevents hammering the DB while the user is typing
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>{
    pushToFirebase();
    updateSidebarCount();
  }, 800);
  updateSidebarCount(); // update UI immediately
}

function initFreshState(){
  S.deptos=[];
  INITIAL_DEPTOS.forEach(def=>S.deptos.push(makeDepto(def.id,def.label,def.group)));
  S.agenda=[];
  S.customServices=[];
  S.proveedores=[];
  S.infoItems=[];
  S.svcCostos={};
}

function migrateState(){
  if(!S.proveedores) S.proveedores=[];
  if(!S.customServices) S.customServices=[];
  if(!S.infoItems) S.infoItems=[];
  if(!S.svcCostos) S.svcCostos={};
  INITIAL_DEPTOS.forEach(def=>{
    if(!S.deptos.find(d=>d.id===def.id))
      S.deptos.push(makeDepto(def.id,def.label,def.group));
  });
  S.deptos.forEach(d=>{
    // occupied boolean → occupancy string
    if(d.occupancy===undefined){
      d.occupancy = d.occupied ? 'occupied' : 'empty';
      delete d.occupied;
    }
    // edenor → luz
    if(d.services?.edenor!==undefined && d.services?.luz===undefined){
      d.services.luz=d.services.edenor; delete d.services.edenor;
      d.accounts.luz=d.accounts.edenor||''; delete d.accounts.edenor;
    }
    // cochera
    if(!d.cochera) d.cochera={tiene:false,numero:'',precio:''};
    // docs arrays
    if(!d.docs) d.docs=[];
    if(!d.docsServicios) d.docsServicios=[];
    if(!d.docsMantenimiento) d.docsMantenimiento=[];
    if(!d.fotos) d.fotos=[];
    if(!d.notas) d.notas=[];
    // ensure all service keys exist
    getAllSvcs().forEach(s=>{
      if(d.services[s.key]===undefined) d.services[s.key]=false;
      if(d.accounts[s.key]===undefined) d.accounts[s.key]='';
    });
  });
}

function todayKey(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`}

function monthLabel(k){const{year,month}=parseKey(k);return`${MONTHS[month]} ${year}`}

// ======= IPC =======
let ipcLoading=false;
async function fetchIPC(){
  if(ipcLoading)return;
  const now=Date.now();
  if(S.ipcCache && S.ipcDate && (now-S.ipcDate)<3600000*6) return S.ipcCache;
  ipcLoading=true;
  try{
    // INDEC API - serie IPC Nacional nivel general
    const url='https://apis.datos.gob.ar/series/api/series/?ids=148.3_INIVELNAL_DICI_M_26&limit=3&sort=desc&format=json';
    const r=await fetch(url);
    const j=await r.json();
    const datos=j.data;
    if(datos&&datos.length>=2){
      const last=datos[0][1];
      const prev=datos[1][1];
      const pct=((last-prev)/prev*100);
      S.ipcCache={pct:pct.toFixed(2),date:datos[0][0],index:last,prev:prev};
      S.ipcDate=now;
      save();
      return S.ipcCache;
    }
  }catch(e){}
  finally{ipcLoading=false;}
  return null;
}

// ======= ALERTAS =======
function getAlerts(){
  const al=[];
  const now=new Date();
  const today2=now.getDate();
  const tk=todayKey();
  S.deptos.forEach(d=>{
    if(d.occupancy!=='occupied')return;
    const p=d.payments[tk];
    const dname=`${d.group} ${d.label}`;
    if(p==='no'||p===undefined){
      const diff=d.paymentDay-today2;
      if(diff<=0) al.push({type:'ah',icon:'ti-alert-circle',title:`${dname} – Alquiler vencido`,desc:`${d.tenant} · Vencía día ${d.paymentDay}`});
      else if(diff<=5) al.push({type:'am2',icon:'ti-bell',title:`${dname} – Pago en ${diff} día${diff===1?'':'s'}`,desc:`${d.tenant} · Vence el día ${d.paymentDay}`});
    }
    // IPC: si hay contrato en ARS y la última actualización fue hace 3+ meses
    if(d.contract&&d.contract.currency==='ars'&&d.contract.amount&&d.contract.lastUpdate){
      const lu=new Date(d.contract.lastUpdate);
      const mDiff=(now.getFullYear()-lu.getFullYear())*12+(now.getMonth()-lu.getMonth());
      if(mDiff>=3) al.push({type:'am2',icon:'ti-trending-up',title:`${dname} – Actualización IPC pendiente`,desc:`${d.tenant} · Última actualización: ${fDate(d.contract.lastUpdate)}`});
    }
  });
  S.agenda.forEach(ev=>{
    if(ev.done)return;
    const evD=new Date(ev.date+'T00:00:00');
    const diff=Math.round((evD-now)/86400000);
    if(diff<0) al.push({type:'ah',icon:'ti-calendar-x',title:`Tarea vencida: ${ev.title}`,desc:`Era el ${fDate(ev.date)}`});
    else if(diff<=3) al.push({type:'am2',icon:'ti-calendar-event',title:`Tarea próxima: ${ev.title}`,desc:`${fDate(ev.date)} · ${CL[ev.category]}`});
  });
  return al;
}

// ======= COSTOS DE SERVICIOS =======
function getSvcMes(deptoId, tk, svcKey){
  return S.svcCostos?.[deptoId]?.[tk]?.[svcKey] || {monto:'', pagado:false};
}
function setSvcMes(deptoId, tk, svcKey, monto, pagado){
  if(!S.svcCostos) S.svcCostos={};
  if(!S.svcCostos[deptoId]) S.svcCostos[deptoId]={};
  if(!S.svcCostos[deptoId][tk]) S.svcCostos[deptoId][tk]={};
  S.svcCostos[deptoId][tk][svcKey]={monto, pagado};
}
function getSvcHistorial(deptoId, svcKey){
  // Returns sorted array of {tk, monto, pagado}
  const dc = S.svcCostos?.[deptoId]||{};
  return Object.keys(dc)
    .filter(tk=>dc[tk][svcKey]?.monto!==''&&dc[tk][svcKey]?.monto!==undefined)
    .sort((a,b)=>b.localeCompare(a))
    .map(tk=>({tk, ...dc[tk][svcKey]}));
}
function totalSvcMes(deptoId, tk){
  // Total de todos los servicios de un depto en un mes
  const mes = S.svcCostos?.[deptoId]?.[tk]||{};
  return Object.values(mes).reduce((acc,v)=>acc+Number(v.monto||0),0);
}
function totalSvcMesPagado(deptoId, tk){
  const mes = S.svcCostos?.[deptoId]?.[tk]||{};
  return Object.values(mes).filter(v=>v.pagado).reduce((acc,v)=>acc+Number(v.monto||0),0);
}

function rFloorGrid(tk){
  let h='';
  const groups=[...new Set(S.deptos.map(d=>d.group))].sort((a,b)=>a.localeCompare(b,'es'));
  groups.forEach(g=>{
    const gDeptos=S.deptos.filter(d=>d.group===g).sort((a,b)=>a.label.localeCompare(b.label,'es',{numeric:true}));
    h+=`<div class="fl">${g}</div>`;
    gDeptos.forEach(d=>{
      const st=gps(d,tk);
      const bc=st==='paid'?'bp':st==='partial'?'bpa':st==='na'?'bna':st==='empty'?'be':'bu';
      const bt=st==='paid'?'Pagó':st==='partial'?'Parcial':st==='na'?'No aplica':st==='empty'?'Vacío':'Debe';
      const dots=getAllSvcs().filter(s=>d.services[s.key]).map(s=>`<span class="sd" style="background:${svcColor(s.key)}" title="${s.label}"></span>`).join('');
      h+=`<div class="dc" onclick="openDepto('${d.id}')">
        <div class="did">${d.group} · ${d.label}</div>
        <div class="dname">${d.tenant||'<span style="color:var(--tx2);font-weight:400;font-size:13px">Sin inquilino</span>'}</div>
        <div class="dstat"><span class="badge ${bc}">${bt}</span>${d.contract&&d.contract.currency==='usd'?'<span class="badge b-usd">USD</span>':''}${d.contract&&d.contract.type&&st!=='na'?`<span class="badge b-${d.contract.type}">${{largo:'Largo',corto:'Corto',local:'Local'}[d.contract.type]||d.contract.type}</span>`:''}</div>
        <div class="sm">${dots}</div>
      </div>`;
    });
  });
  return h;
}

function gps(d,k){
  if(d.occupancy==='na')return'na';
  if(d.occupancy!=='occupied')return'empty';
  const p=d.payments[k];
  if(p==='yes')return'paid';
  if(p==='partial')return'partial';
  return'no';
}

function svcColor(key){

function setDF(f){window._df=f;render();}

function rDeptoList(f,tk){
  let h='';
  const groups=[...new Set(S.deptos.map(d=>d.group))].sort((a,b)=>a.localeCompare(b,'es'));
  groups.forEach(g=>{
    const gDeptos=S.deptos.filter(d=>{
      if(d.group!==g)return false;
      if(f==='all')return true;
      if(f==='occupied')return d.occupancy==='occupied';
      if(f==='empty')return d.occupancy==='empty';
      if(f==='na')return d.occupancy==='na';
      if(f==='paid')return d.payments[tk]==='yes';
      if(f==='unpaid')return d.occupancy==='occupied'&&d.payments[tk]!=='yes';
      return true;
    });
    if(!gDeptos.length)return;
    gDeptos.sort((a,b)=>a.label.localeCompare(b.label,'es',{numeric:true}));
    h+=`<div class="fl">${g}</div>`;
    gDeptos.forEach(d=>{
      const st=gps(d,tk);
      const bc=st==='paid'?'bp':st==='partial'?'bpa':st==='na'?'bna':st==='empty'?'be':'bu';
      const bt=st==='paid'?'Pagó este mes':st==='partial'?'Pago parcial':st==='na'?'No aplica':st==='empty'?'Vacío':'Sin pago';
      const dots=getAllSvcs().filter(s=>d.services[s.key]).map(s=>`<span class="sd" style="background:${svcColor(s.key)}" title="${s.label}"></span>`).join('');
      h+=`<div class="dc" onclick="openDepto('${d.id}')">
        <div class="did">${d.group} · ${d.label}</div>
        <div class="dname">${d.tenant||'<span style="color:var(--tx2);font-weight:400;font-size:13px">Sin inquilino</span>'}</div>
        <div class="dstat"><span class="badge ${bc}">${bt}</span>${d.contract?.currency==='usd'?'<span class="badge b-usd">USD</span>':''}</div>
        ${d.occupancy==='occupied'?`<div style="font-size:12px;color:var(--tx2);margin-top:4px">${d.phone||''}${d.email?' · '+d.email:''}</div>`:''}
        <div class="sm">${dots}</div>
      </div>`;
    });
  });
  return h||'<div class="es" style="grid-column:1/-1"><i class="ti ti-search"></i><p>Sin resultados</p></div>';
}

function rPagosUnificado(){
  const n=new Date();
  const months=[];
  for(let i=3;i>=-1;i--){
    const d=new Date(n.getFullYear(),n.getMonth()-i,1);
    months.push({key:mk(d.getFullYear(),d.getMonth()),label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`});
  }
  const tk=window._pm||todayKey();
  const occ=S.deptos.filter(d=>d.occupancy==='occupied')
    .sort((a,b)=>(a.group+a.label).localeCompare(b.group+b.label,'es',{numeric:true}));

  // Totals
  const totalAlq=occ.reduce((acc,d)=>{
    const base=Number(d.contract?.amount||0);
    const coch=d.cochera?.tiene?Number(d.cochera.precio||0):0;
    return acc+base+coch;
  },0);
  const cobradoAlq=occ.filter(d=>d.payments[tk]==='yes').reduce((acc,d)=>{
    return acc+Number(d.contract?.amount||0)+(d.cochera?.tiene?Number(d.cochera.precio||0):0);
  },0);
  const totalSvcs=occ.reduce((acc,d)=>acc+totalSvcMes(d.id,tk),0);
  const cobradoSvcs=occ.reduce((acc,d)=>acc+totalSvcMesPagado(d.id,tk),0);

  return`
  <div class="hdr"><h1>Pagos</h1></div>
  <div class="tb">${months.map(m=>`<div class="tab ${m.key===tk?'active':''}" onclick="setPM('${m.key}')">${m.label}</div>`).join('')}</div>

  <div class="stats-grid" style="margin-bottom:16px">
    <div class="sc"><div class="lbl">Alquiler esperado</div><div class="val" style="font-size:16px">$ ${totalAlq.toLocaleString('es-AR')}</div></div>
    <div class="sc s"><div class="lbl">Alquiler cobrado</div><div class="val" style="font-size:16px">$ ${cobradoAlq.toLocaleString('es-AR')}</div></div>
    <div class="sc"><div class="lbl">Servicios esperado</div><div class="val" style="font-size:16px">$ ${totalSvcs.toLocaleString('es-AR')}</div></div>
    <div class="sc s"><div class="lbl">Servicios cobrado</div><div class="val" style="font-size:16px">$ ${cobradoSvcs.toLocaleString('es-AR')}</div></div>
  </div>

  ${occ.length===0?`<div class="card"><div class="es"><i class="ti ti-user"></i><p>No hay inquilinos</p></div></div>`:
  occ.map(d=>{
    const p=d.payments[tk]||'no';
    const cur=d.contract?.currency==='usd'?'USD':'$';
    const baseAmt=d.contract?.amount?Number(d.contract.amount):0;
    const cochAmt=d.cochera?.tiene?Number(d.cochera.precio||0):0;
    const svcsActivos=getAllSvcs().filter(s=>d.services[s.key]&&!(s.key==='expensas'&&d.group==='Vilela'));
    const totalSvc=totalSvcMes(d.id,tk);
    const cobSvc=totalSvcMesPagado(d.id,tk);
    const totalDepto=(p==='yes'?(baseAmt+cochAmt):0)+cobSvc;
    const esperadoDepto=(baseAmt+cochAmt)+totalSvc;
    const estadoClass=esperadoDepto===0?'':totalDepto>=esperadoDepto?'pagado':totalDepto>0?'parcial':'debe';

    return`<div class="card" style="margin-bottom:10px">
      <div class="ch">
        <div style="cursor:pointer;flex:1" onclick="togglePagoRow('${d.id}')">
          <div style="font-size:14px;font-weight:500">${d.group} ${d.label}${d.tenant?' – '+d.tenant:''}</div>
          <div style="font-size:12px;color:var(--tx2);margin-top:2px">Vence día ${d.paymentDay} · ${d.phone||'sin tel.'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${baseAmt?`<button class="btn btn-s btn-w" onclick="openAjustarAlquiler('${d.id}')"><i class="ti ti-trending-up"></i> Ajustar</button>`:''}
          ${esperadoDepto>0?`<span id="total-${d.id}" class="gs-total ${estadoClass}">$ ${totalDepto.toLocaleString('es-AR')} / $ ${esperadoDepto.toLocaleString('es-AR')}</span>`:''}
          <i class="ti ti-chevron-down" id="chev-${d.id}" style="color:var(--tx2);transition:transform .2s;cursor:pointer" onclick="togglePagoRow('${d.id}')"></i>
        </div>
      </div>
      <div id="pagorow-${d.id}" style="display:none">
        <!-- ALQUILER -->
        <div style="padding:8px 16px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-size:13px;font-weight:500">🏠 Alquiler${cochAmt?` + cochera`:''}</div>
            <div style="font-size:12px;color:var(--tx2)">${baseAmt?`${cur} ${baseAmt.toLocaleString('es-AR')}${cochAmt?' + cochera $'+cochAmt.toLocaleString('es-AR'):''}`:' Sin monto cargado'}</div>
          </div>
          <button class="gs-toggle ${p==='yes'?'pagado':''}" onclick="toggleAlquilerPago('${d.id}','${tk}')">
            <i class="ti ${p==='yes'?'ti-check':'ti-clock'}"></i> ${p==='yes'?'Cobrado':'Pendiente'}

        </div>
        <!-- SERVICIOS -->
        ${svcsActivos.length===0?`<div style="padding:10px 16px;font-size:13px;color:var(--tx2)">Sin servicios activos</div>`:
        svcsActivos.map(s=>{

              <div class="gs-monto" style="margin-top:4px">
                <span style="color:var(--tx2);font-size:12px">$</span>
                <input type="number" value="${reg.monto||''}" placeholder="0" style="width:90px;padding:4px 8px;background:var(--bg1);border:0.5px solid var(--bdr);border-radius:var(--rs);font-size:13px;color:var(--tx1);text-align:right"
                  onblur="guardarSvcCosto('${d.id}','${tk}','${s.key}',this.value,${reg.pagado})">
              </div>
            </div>
            <button class="gs-toggle ${reg.pagado?'pagado':''}" onclick="toggleSvcPago('${d.id}','${tk}','${s.key}')">
              <i class="ti ${reg.pagado?'ti-check':'ti-clock'}"></i> ${reg.pagado?'Cobrado':'Pendiente'}
            </button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('')}`;
}

}

// ======= AJUSTAR ALQUILER =======
async function openAjustarAlquiler(id){
  const d=S.deptos.find(x=>x.id===id);
  if(!d)return;
  const c=d.contract||{};
  const base=Number(c.amount||0);
  const coch=d.cochera?.tiene?Number(d.cochera.precio||0):0;
  const cur=c.currency==='usd'?'USD':'$';

  document.getElementById('mtitle').textContent=`Ajustar alquiler — ${d.group} ${d.label}`;
  document.getElementById('mbody').innerHTML=`
    <div style="background:var(--bg1);border-radius:var(--rs);padding:12px 14px;margin-bottom:16px;font-size:13px">
      <div style="color:var(--tx2);margin-bottom:4px">Monto actual</div>
      <div style="font-size:18px;font-weight:500">${cur} ${base.toLocaleString('es-AR')}${coch?` <span style="font-size:13px;color:var(--tx2)">+ cochera $ ${coch.toLocaleString('es-AR')}</span>`:''}</div>
    </div>
    <div class="ipc-loader" id="ipc-status"><i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Consultando IPC del INDEC...</div>
    <style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
    <div id="ipc-result"></div>
    <hr style="border:none;border-top:0.5px solid var(--bdr);margin:16px 0">
    <div class="st">Ajuste manual</div>
    <div class="fg2" style="margin-bottom:12px">
      <div class="fi">
        <label class="fl2">Por porcentaje (%)</label>
        <input type="number" id="aj-pct" placeholder="Ej: 8.4" step="0.1" min="0" oninput="calcAjuste('${id}')">
      </div>
      <div class="fi">
        <label class="fl2">O nuevo monto directo (${cur})</label>
        <input type="number" id="aj-monto" placeholder="${base}" min="0" oninput="calcAjusteDirecto('${id}')">
      </div>
    </div>
    ${coch?`<div class="fi"><label class="fl2">Nuevo monto cochera ($)</label><input type="number" id="aj-coch" placeholder="${coch}" min="0"></div>`:''}
    <div id="aj-preview" style="min-height:40px"></div>
    <button class="btn btn-p" style="width:100%;justify-content:center;margin-top:8px" onclick="aplicarAjuste('${id}')">
      <i class="ti ti-check"></i> Aplicar ajuste
    </button>`;
  document.getElementById('mft').innerHTML=`<button class="btn" onclick="cm()">Cerrar</button>`;
  document.getElementById('modal').style.display='flex';

  const ipc=await fetchIPC();
  const statusEl=document.getElementById('ipc-status');
  const resultEl=document.getElementById('ipc-result');
  if(!statusEl)return;
  if(!ipc){
    statusEl.innerHTML=`<span style="color:var(--tx2);font-size:13px"><i class="ti ti-wifi-off"></i> No se pudo obtener el IPC automático.</span>`;
    return;
  }
  const pct=parseFloat(ipc.pct);
  const nuevoBase=Math.round(base*(1+pct/100));
  const nuevoCoch=coch?Math.round(coch*(1+pct/100)):0;
  statusEl.innerHTML='';
  resultEl.innerHTML=`
    <div class="ipc-box">
      <div style="font-size:12px;color:var(--suc)">IPC NACIONAL — ${ipc.date}</div>
      <div class="ipc-val">+${ipc.pct}%</div>
      <div class="ipc-sub">Fuente: INDEC · apis.datos.gob.ar</div>
      <div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="font-size:13px">${cur} ${base.toLocaleString('es-AR')} → <strong>${cur} ${nuevoBase.toLocaleString('es-AR')}</strong>${coch?' · cochera $'+coch.toLocaleString('es-AR')+' → <strong>$'+nuevoCoch.toLocaleString('es-AR')+'</strong>':''}</div>
        <button class="btn btn-p btn-s" onclick="presetAjuste('${id}',${pct},${nuevoBase},${nuevoCoch})"><i class="ti ti-bolt"></i> Usar IPC</button>
      </div>
    </div>`;
}

function presetAjuste(id,pct,nuevoBase,nuevoCoch){
  const pctEl=document.getElementById('aj-pct');
  const montoEl=document.getElementById('aj-monto');
  const cochEl=document.getElementById('aj-coch');
  if(pctEl) pctEl.value=pct;
  if(montoEl) montoEl.value=nuevoBase;
  if(cochEl) cochEl.value=nuevoCoch||'';
  const d=S.deptos.find(x=>x.id===id);
  if(d) showAjPreview(d,nuevoBase,nuevoCoch);
}

function calcAjuste(id){
  const d=S.deptos.find(x=>x.id===id);
  if(!d)return;
  const base=Number(d.contract?.amount||0);
  const coch=d.cochera?.tiene?Number(d.cochera.precio||0):0;
  const pct=parseFloat(document.getElementById('aj-pct')?.value||0);
  if(!pct||isNaN(pct))return;
  const nuevoBase=Math.round(base*(1+pct/100));
  const nuevoCoch=coch?Math.round(coch*(1+pct/100)):0;
  const montoEl=document.getElementById('aj-monto');
  const cochEl=document.getElementById('aj-coch');
  if(montoEl) montoEl.value=nuevoBase;
  if(cochEl&&nuevoCoch) cochEl.value=nuevoCoch;
  showAjPreview(d,nuevoBase,nuevoCoch);
}

function calcAjusteDirecto(id){
  const d=S.deptos.find(x=>x.id===id);
  if(!d)return;
  const base=Number(d.contract?.amount||0);
  const coch=d.cochera?.tiene?Number(d.cochera.precio||0):0;
  const nuevo=Number(document.getElementById('aj-monto')?.value||0);
  if(!nuevo)return;
  const nuevoCoch=Number(document.getElementById('aj-coch')?.value||coch);
  if(base>0){
    const pct=((nuevo-base)/base*100).toFixed(2);
    const pctEl=document.getElementById('aj-pct');
    if(pctEl) pctEl.value=pct;
  }
  showAjPreview(d,nuevo,nuevoCoch);
}

function showAjPreview(d,nuevoBase,nuevoCoch){
  const cur=d.contract?.currency==='usd'?'USD':'$';
  const base=Number(d.contract?.amount||0);
  const coch=d.cochera?.tiene?Number(d.cochera.precio||0):0;
  const diff=nuevoBase-base;
  const prev=document.getElementById('aj-preview');
  if(!prev)return;
  prev.innerHTML=`<div style="background:rgba(74,158,224,0.1);border:0.5px solid rgba(74,158,224,.2);border-radius:var(--rs);padding:10px 12px;font-size:13px;margin-top:4px">
    <strong>Resultado:</strong> ${cur} ${base.toLocaleString('es-AR')} → ${cur} ${nuevoBase.toLocaleString('es-AR')}
    <span style="color:${diff>=0?'var(--suc)':'var(--dan)'};margin-left:6px">${diff>=0?'+':''}${diff.toLocaleString('es-AR')}</span>
    ${nuevoCoch&&nuevoCoch!==coch?`<br>Cochera: $ ${coch.toLocaleString('es-AR')} → $ ${nuevoCoch.toLocaleString('es-AR')}`:''}
  </div>`;
}

function aplicarAjuste(id){
  const d=S.deptos.find(x=>x.id===id);
  if(!d)return;
  const nuevoBase=Number(document.getElementById('aj-monto')?.value||0);
  if(!nuevoBase){alert('Ingresá el nuevo monto.');return;}
  const cochEl=document.getElementById('aj-coch');
  const nuevoCoch=cochEl?Number(cochEl.value||d.cochera?.precio||0):undefined;
  d.contract.amount=nuevoBase;
  d.contract.lastUpdate=today();
  if(d.cochera?.tiene&&nuevoCoch) d.cochera.precio=nuevoCoch;
  save();cm();render();updateBadge();
}

// ======= GASTOS DE SERVICIOS =======
function tk2label(tk){
  const [y,m]=tk.split('-');
  return `${MONTHS[parseInt(m)-1]} ${y}`;
}
function guardarSvcCosto(deptoId, tk, svcKey, monto, pagado){
  setSvcMes(deptoId, tk, svcKey, monto===''?'':Number(monto), pagado);
  save();
}
function toggleSvcPago(deptoId, tk, svcKey){
  const reg=getSvcMes(deptoId, tk, svcKey);
  setSvcMes(deptoId, tk, svcKey, reg.monto, !reg.pagado);
  save();
  // Update button in place without re-rendering the whole page
  const btn=document.querySelector(`[onclick="toggleSvcPago('${deptoId}','${tk}','${svcKey}')"]`);
  if(btn){
    const pagado=!reg.pagado;
    btn.className=`gs-toggle ${pagado?'pagado':''}`;
    btn.innerHTML=`<i class="ti ${pagado?'ti-check':'ti-clock'}"></i> ${pagado?'Cobrado':'Pendiente'}`;
  }
  updatePagoRowTotal(deptoId, tk);
}

function toggleAlquilerPago(deptoId, tk){
  const d=S.deptos.find(x=>x.id===deptoId);
  if(!d)return;
  const cur=d.payments[tk]||'no';
  const next=cur==='yes'?'no':'yes';
  d.payments[tk]=next;
  save();
  updateBadge();
  // Update button in place
  const btn=document.querySelector(`[onclick="toggleAlquilerPago('${deptoId}','${tk}')"]`);
  if(btn){
    btn.className=`gs-toggle ${next==='yes'?'pagado':''}`;
    btn.innerHTML=`<i class="ti ${next==='yes'?'ti-check':'ti-clock'}"></i> ${next==='yes'?'Cobrado':'Pendiente'}`;
  }
  updatePagoRowTotal(deptoId, tk);
}

function updatePagoRowTotal(deptoId, tk){
  // Update the header total without collapsing
  const d=S.deptos.find(x=>x.id===deptoId);
  if(!d)return;
  const p=d.payments[tk]||'no';
  const baseAmt=Number(d.contract?.amount||0);
  const cochAmt=d.cochera?.tiene?Number(d.cochera.precio||0):0;
  const totalSvc=totalSvcMes(deptoId,tk);
  const cobSvc=totalSvcMesPagado(deptoId,tk);
  const totalDepto=(p==='yes'?(baseAmt+cochAmt):0)+cobSvc;
  const esperadoDepto=(baseAmt+cochAmt)+totalSvc;
  const estadoClass=esperadoDepto===0?'':totalDepto>=esperadoDepto?'pagado':totalDepto>0?'parcial':'debe';
  const totalEl=document.getElementById('total-'+deptoId);
  if(totalEl){
    totalEl.className=`gs-total ${estadoClass}`;
    totalEl.textContent=`$ ${totalDepto.toLocaleString('es-AR')} / $ ${esperadoDepto.toLocaleString('es-AR')}`;
  }
}
function openHistorialSvc(deptoId){
  const d=S.deptos.find(x=>x.id===deptoId);
  if(!d)return;
  const svcsActivos=getAllSvcs().filter(s=>d.services[s.key]);
  const dc=S.svcCostos?.[deptoId]||{};
  const tks=Object.keys(dc).sort((a,b)=>b.localeCompare(a));
  document.getElementById('mtitle').textContent=`Historial servicios — ${d.group} ${d.label}`;
  document.getElementById('mbody').innerHTML=tks.length===0?
    `<div class="es"><i class="ti ti-history"></i><p>Sin historial todavía</p></div>`:
    tks.map(tk=>{
      const mesData=dc[tk]||{};
      const total=Object.values(mesData).reduce((a,v)=>a+Number(v.monto||0),0);
      const cobrado=Object.values(mesData).filter(v=>v.pagado).reduce((a,v)=>a+Number(v.monto||0),0);
      const estadoClass=total===0?'':cobrado===0?'debe':cobrado<total?'parcial':'pagado';
      return`<div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <strong style="font-size:14px">${tk2label(tk)}</strong>
          <span class="gs-total ${estadoClass}">$ ${cobrado.toLocaleString('es-AR')} / $ ${total.toLocaleString('es-AR')}</span>
        </div>
        ${svcsActivos.map(s=>{
          const reg=mesData[s.key];
          if(!reg||reg.monto==='') return'';
          return`<div class="hist-row">
            <span style="color:${svcColor(s.key)}">${s.emoji||'🔌'} ${s.label}</span>
            <div style="display:flex;align-items:center;gap:10px">
              <span>$ ${Number(reg.monto).toLocaleString('es-AR')}</span>
              <span class="badge ${reg.pagado?'bp':'bu'}">${reg.pagado?'Cobrado':'Pendiente'}</span>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('<hr style="border:none;border-top:0.5px solid var(--bdr);margin:4px 0 16px">');
  document.getElementById('mft').innerHTML=`<button class="btn" onclick="cm()">Cerrar</button>`;
  document.getElementById('modal').style.display='flex';
}

    ${deptos.length===0?`<div class="es"><i class="ti ti-plug-x"></i><p>Ningún depto</p></div>`:deptos.map(d=>`<div class="sr"><div class="si"><div class="dot-g" style="background:${svcColor(s.key)}"></div><div><div class="sn">${d.group} ${d.label}${d.tenant?' – '+d.tenant:''}</div>${d.accounts[s.key]?`<div class="sa">Cuenta: ${d.accounts[s.key]}</div>`:''}</div></div><button class="btn btn-s" onclick="openDepto('${d.id}','servicios')"><i class="ti ti-edit"></i></button></div>`).join('')}

function openAddSvc(){
  document.getElementById('mtitle').textContent='Agregar servicio';
  document.getElementById('mbody').innerHTML=`
    <div class="fi"><label class="fl2">Nombre del servicio</label><input id="ns-label" placeholder="Ej: Telecentro, AYSA, Expensas..."></div>
    <div class="fg2">
      <div class="fi"><label class="fl2">Emoji (opcional)</label><input id="ns-emoji" placeholder="🔌" maxlength="4" style="font-size:20px;text-align:center"></div>
      <div class="fi"><label class="fl2">Ícono (tabler)</label><select id="ns-icon">
        ${['ti-plug','ti-bolt','ti-flame','ti-wifi','ti-droplet','ti-building','ti-tool','ti-device-tv','ti-phone','ti-car'].map(ic=>`<option value="${ic}">${ic.replace('ti-','')}</option>`).join('')}
      </select></div>
    </div>
    <p style="font-size:12px;color:var(--tx2)">Una vez creado, aparecerá en la lista de servicios de cada departamento.</p>`;
  document.getElementById('mft').innerHTML=`<button class="btn" onclick="cm()">Cancelar</button><button class="btn btn-p" onclick="confirmAddSvc()"><i class="ti ti-plus"></i> Crear servicio</button>`;
  document.getElementById('modal').style.display='flex';
}

function confirmAddSvc(){
  const label=document.getElementById('ns-label').value.trim();
  if(!label){alert('Ingresá el nombre del servicio.');return;}
  const key='custom_'+label.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_'+Date.now();
  const emoji=document.getElementById('ns-emoji').value.trim()||'🔌';
  const icon=document.getElementById('ns-icon').value;
  if(!S.customServices)S.customServices=[];
  S.customServices.push({key,label,icon,emoji});
  // add key to all existing deptos
  S.deptos.forEach(d=>{d.services[key]=false;d.accounts[key]='';});
  save();cm();render();
}

function deleteSvc(key){
  if(!confirm('¿Eliminar este servicio? Se quitará de todos los departamentos.'))return;
  S.customServices=S.customServices.filter(s=>s.key!==key);
  S.deptos.forEach(d=>{delete d.services[key];delete d.accounts[key];});
  save();render();
}

function rAgenda(){
  const f=window._af||'all';
  const sd=window._asd||false;
  let items=[...S.agenda];
  if(f!=='all')items=items.filter(ev=>ev.category===f);
  if(!sd)items=items.filter(ev=>!ev.done);
  items.sort((a,b)=>a.date.localeCompare(b.date));
  return`
  <div class="hdr"><h1>Agenda</h1><button class="btn btn-p" onclick="openAgendaM()"><i class="ti ti-plus"></i> Nuevo evento</button></div>
  <div class="fb">
    <button class="fb2 ${f==='all'?'active':''}" onclick="setAF('all')">Todos</button>
    ${CATS.map(c=>`<button class="fb2 ${f===c?'active':''}" onclick="setAF('${c}')">${CL[c]}</button>`).join('')}
    <button class="fb2 ${sd?'active':''}" onclick="toggleSD()" style="margin-left:auto">${sd?'Ocultar':'Mostrar'} completados</button>
  </div>
  <div class="card">
    ${items.length===0?`<div class="es"><i class="ti ti-calendar"></i><p>Sin eventos</p></div>`:items.map(ev=>`<div class="ai">
      <div class="adot" style="background:${ev.done?'var(--bdr)':cc(ev.category)};${ev.done?'opacity:.4':''}"></div>
      <div class="at" style="${ev.done?'opacity:.5':''}"><span style="${ev.done?'text-decoration:line-through':''}"> ${ev.title}</span><div class="am">${fDate(ev.date)} · <span class="cb2 c${ev.category.slice(0,2)}">${CL[ev.category]}</span>${ev.notes?' · '+ev.notes:''}</div></div>
      <div class="aa">
        ${!ev.done?`<button class="btn btn-s" onclick="markDone('${ev.id}')"><i class="ti ti-check"></i></button>`:`<button class="btn btn-s" onclick="markUndone('${ev.id}')"><i class="ti ti-rotate-left"></i></button>`}
        <button class="btn btn-s" onclick="openAgendaM('${ev.id}')"><i class="ti ti-edit"></i></button>
        <button class="btn btn-s" onclick="delAg('${ev.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>`).join('')}
  </div>`;
}
function setAF(f){window._af=f;render();}
function toggleSD(){window._asd=!window._asd;render();}
function markDone(id){const ev=S.agenda.find(e=>e.id===id);if(ev){ev.done=true;save();render();updateBadge();}}
function markUndone(id){const ev=S.agenda.find(e=>e.id===id);if(ev){ev.done=false;save();render();updateBadge();}}
function delAg(id){S.agenda=S.agenda.filter(e=>e.id!==id);save();render();updateBadge();}

function rAlertas(){
  const al=getAlerts();
  return`
  <div class="hdr"><h1>Alertas</h1></div>
  <div class="card">${al.length===0?`<div class="es"><i class="ti ti-circle-check" style="color:var(--suc)"></i><p>Todo en orden</p></div>`:al.map(a=>`<div class="alert-i ${a.type}"><i class="ti ${a.icon} aic" aria-hidden="true"></i><div><div class="atit">${a.title}</div><div class="adesc">${a.desc}</div></div></div>`).join('')}</div>`;
}

function uploadDoc(id, input, docKey, statusId){
  docKey = docKey || 'docs';
  const d = S.deptos.find(x=>x.id===id);
  if(!d||!input.files[0]) return;
  const file = input.files[0];
  const size = file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' MB':(file.size/1024).toFixed(0)+' KB';

  const statusEl = statusId ? document.getElementById(statusId) : null;
  if(statusEl) statusEl.innerHTML = `<span style="color:var(--tx2);font-size:13px"><i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Subiendo ${file.name}...</span>`;

  const path = `docs/${id}/${docKey}/${Date.now()}_${file.name}`;
  const ref = storage.ref(path);

  ref.put(file).then(snap=>snap.ref.getDownloadURL()).then(url=>{
    if(!d[docKey]) d[docKey]=[];
    d[docKey].push({name:file.name, date:today(), size, url, path});
    save();
    const d2=S.deptos.find(x=>x.id===id);
    renderDeptoModal(d2);
  }).catch(e=>{
    console.error('Upload error',e);
    if(statusEl) statusEl.innerHTML=`<span style="color:var(--dan);font-size:13px">Error al subir: ${e.message}</span>`;
  });
}

function downloadDoc(id, idx, docKey){
  docKey = docKey || 'docs';
  const d = S.deptos.find(x=>x.id===id);
  if(!d||!d[docKey]||!d[docKey][idx]) return;
  const doc = d[docKey][idx];
  if(doc.url){
    window.open(doc.url, '_blank');
  } else if(doc.data){
    const a = document.createElement('a');
    a.href = doc.data;
    a.download = doc.name;
    a.click();
  }
}

function delDoc(id, idx, docKey){
  docKey = docKey || 'docs';
  const d = S.deptos.find(x=>x.id===id);
  if(!d) return;
  if(!confirm(`¿Eliminar "${d[docKey][idx].name}"? Se borrará permanentemente.`)) return;
  const doc = d[docKey][idx];
  if(doc.path){
    storage.ref(doc.path).delete().catch(e=>console.warn('Storage delete error:',e));
  }
  d[docKey].splice(idx,1);
  save();
  renderDeptoModal(d);
}

// ======= FOTOS =======
let _lbDeptoId=null, _lbIdx=0;

async function uploadFotos(id, input){
  const d=S.deptos.find(x=>x.id===id);
  if(!d||!input.files.length)return;
  const files=[...input.files];
  const statusEl=document.getElementById('fotos-status-'+id);
  if(statusEl) statusEl.innerHTML=`<span style="color:var(--tx2);font-size:13px"><i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Subiendo ${files.length} foto${files.length>1?'s':''}...</span>`;
  if(!d.fotos) d.fotos=[];
  let done=0;
  for(const file of files){
    const size=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' MB':(file.size/1024).toFixed(0)+' KB';
    const path=`fotos/${id}/${Date.now()}_${file.name}`;
    try{
      const snap=await storage.ref(path).put(file);
      const url=await snap.ref.getDownloadURL();
      d.fotos.push({name:file.name,date:today(),size,url,path,caption:''});
      done++;
      if(statusEl) statusEl.innerHTML=`<span style="color:var(--tx2);font-size:13px"><i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> ${done}/${files.length} subidas...</span>`;
    }catch(e){
      console.error('Upload error',e);
    }
  }
  save();
  if(statusEl) statusEl.innerHTML=`<span style="color:var(--suc);font-size:13px"><i class="ti ti-check"></i> ${done} foto${done>1?'s':'s'} subida${done>1?'s':''}</span>`;
  const d2=S.deptos.find(x=>x.id===id);
  renderDeptoModal(d2);
}

function deleteFoto(id,idx){
  const d=S.deptos.find(x=>x.id===id);
  if(!d)return;
  if(!confirm('¿Eliminar esta foto?'))return;
  const f=d.fotos[idx];
  if(f.path) storage.ref(f.path).delete().catch(e=>console.warn('Storage delete:',e));
  d.fotos.splice(idx,1);
  save();
  renderDeptoModal(d);
}

  const cat=window._mntCat||'all';
  const pvs=(S.proveedores||[]).filter(p=>cat==='all'||p.cat===cat)
    .sort((a,b)=>a.name.localeCompare(b.name,'es'));
  const usedCats=[...new Set((S.proveedores||[]).map(p=>p.cat))];
  return`
  <div class="hdr"><h1>Mantenimiento</h1><button class="btn btn-p" onclick="openPvModal()"><i class="ti ti-plus"></i> Agregar proveedor</button></div>
  <div class="fb" style="margin-bottom:16px">
    <span class="cat-pill ${cat==='all'?'active':''}" style="${cat==='all'?'background:var(--pri);border-color:var(--pri)':''}" onclick="setMntCat('all')">Todos (${(S.proveedores||[]).length})</span>
    ${MNT_CATS.filter(c=>usedCats.includes(c.key)||c.key===cat).map(c=>{
      const n=(S.proveedores||[]).filter(p=>p.cat===c.key).length;
      const act=cat===c.key;
      return`<span class="cat-pill ${act?'active':''}" style="${act?`background:${c.color};border-color:${c.color}`:`border-color:${c.color}33;color:${c.color}`}" onclick="setMntCat('${c.key}')"><i class="ti ${c.icon}" style="font-size:13px"></i> ${c.label}${n?` (${n})`:''}</span>`;
    }).join('')}
  </div>
  ${pvs.length===0?`<div class="card"><div class="es"><i class="ti ti-tool" style="opacity:.3"></i><p>${cat==='all'?'No hay proveedores todavía. Agregá el primero.':'Sin proveedores en esta categoría.'}</p></div></div>`:
    pvs.map(p=>rPvCard(p)).join('')}`;
}

function rPvCard(p){
  const c=getMntCat(p.cat);
  const hasDetail=PV_FIELDS.some(f=>p[f.key]&&p[f.key].trim&&p[f.key].trim());
  const detailFields=PV_FIELDS.filter(f=>f.key!=='notas'&&p[f.key]&&p[f.key].trim&&p[f.key].trim());
  return`<div class="pv-card">
    <div class="pv-header">
      <div class="pv-icon" style="background:${c.bg};color:${c.color}"><i class="ti ${c.icon}"></i></div>
      <div class="pv-info">
        <div class="pv-name">${p.name}</div>
        <div class="pv-cat">${c.label}${p.phone?' · <a href="tel:'+p.phone+'" style="color:var(--pri);text-decoration:none">'+p.phone+'</a>':''}</div>
      </div>
      <div class="pv-actions">
        ${p.phone?`<a href="tel:${p.phone}" class="btn btn-s" style="text-decoration:none"><i class="ti ti-phone"></i></a>`:''}
        <button class="btn btn-s" onclick="openPvModal('${p.id}')"><i class="ti ti-edit"></i></button>
        <button class="btn btn-s btn-d" onclick="deletePv('${p.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>
    ${detailFields.length>0?`<div class="pv-detail">
      ${detailFields.map(f=>`<div class="pv-field"><div class="lbl">${f.label}</div><div class="val">${f.type==='date'?fDate(p[f.key]):p[f.key]}</div></div>`).join('')}
      ${p.notas?`<div class="pv-field" style="grid-column:1/-1"><div class="lbl">Notas</div><div class="val" style="font-weight:400;color:var(--tx2)">${p.notas}</div></div>`:''}
    </div>`:''}
  </div>`;
}

function setMntCat(c){window._mntCat=c;render();}

function openPvModal(id){
  const p=id?(S.proveedores||[]).find(x=>x.id===id):null;
  const curCat=p?p.cat:(window._mntCat!=='all'?window._mntCat:'otro');
  document.getElementById('mtitle').textContent=p?'Editar proveedor':'Nuevo proveedor';
  document.getElementById('mbody').innerHTML=`
    <div class="fg2">
      <div class="fi"><label class="fl2">Nombre / Empresa</label><input id="pv-name" value="${p?p.name:''}" placeholder="Ej: TecnoAscensores SA"></div>
      <div class="fi"><label class="fl2">Categoría</label><select id="pv-cat">
        ${MNT_CATS.map(c=>`<option value="${c.key}" ${curCat===c.key?'selected':''}>${c.label}</option>`).join('')}
      </select></div>
    </div>
    <div class="fg2">
      <div class="fi"><label class="fl2">Teléfono</label><input id="pv-phone" type="tel" value="${p?.phone||''}" placeholder="11 1234-5678"></div>
      <div class="fi"><label class="fl2">Tel. emergencia</label><input id="pv-phone2" type="tel" value="${p?.phone2||''}" placeholder="0800..."></div>
    </div>
    <div class="fg2">
      <div class="fi"><label class="fl2">Email</label><input id="pv-email" type="email" value="${p?.email||''}" placeholder="contacto@empresa.com"></div>
      <div class="fi"><label class="fl2">Nombre de contacto</label><input id="pv-contact" value="${p?.contact||''}" placeholder="Nombre y apellido"></div>
    </div>
    <div class="fg2">
      <div class="fi"><label class="fl2">N° de cliente</label><input id="pv-cliente" value="${p?.cliente||''}" placeholder="Ej: 123456"></div>
      <div class="fi"><label class="fl2">N° de contrato</label><input id="pv-contrato" value="${p?.contrato||''}" placeholder="Ej: C-2024-001"></div>
    </div>
    <div class="fg2">
      <div class="fi"><label class="fl2">Venc. contrato</label><input id="pv-vencimiento" type="date" value="${p?.vencimiento||''}"></div>
      <div class="fi"><label class="fl2">Precio / abono</label><input id="pv-precio" value="${p?.precio||''}" placeholder="Ej: $ 50.000 / mes"></div>
    </div>
    <div class="fg2">
      <div class="fi"><label class="fl2">Horario de atención</label><input id="pv-horario" value="${p?.horario||''}" placeholder="Lun-Vie 9-18hs"></div>
      <div class="fi"><label class="fl2">Dirección</label><input id="pv-direccion" value="${p?.direccion||''}" placeholder="Calle 123, CABA"></div>
    </div>
    <div class="fi"><label class="fl2">Notas</label><textarea id="pv-notas" rows="2" placeholder="Observaciones, condiciones, historial...">${p?.notas||''}</textarea></div>`;
  document.getElementById('mft').innerHTML=`
    ${p?`<button class="btn btn-d btn-s" onclick="deletePv('${p.id}')" style="margin-right:auto"><i class="ti ti-trash"></i></button>`:''}
    <button class="btn" onclick="cm()">Cancelar</button>
    <button class="btn btn-p" onclick="savePv('${id||''}')">${p?'Guardar':'Crear'}</button>`;
  document.getElementById('modal').style.display='flex';
}

function savePv(id){
  const name=document.getElementById('pv-name').value.trim();
  if(!name){alert('Ingresá el nombre del proveedor.');return;}
  if(!S.proveedores)S.proveedores=[];
  const data={
    name,
    cat:document.getElementById('pv-cat').value,
    phone:document.getElementById('pv-phone').value.trim(),
    phone2:document.getElementById('pv-phone2').value.trim(),
    email:document.getElementById('pv-email').value.trim(),
    contact:document.getElementById('pv-contact').value.trim(),
    cliente:document.getElementById('pv-cliente').value.trim(),
    contrato:document.getElementById('pv-contrato').value.trim(),
    vencimiento:document.getElementById('pv-vencimiento').value,
    precio:document.getElementById('pv-precio').value.trim(),
    horario:document.getElementById('pv-horario').value.trim(),
    direccion:document.getElementById('pv-direccion').value.trim(),
    notas:document.getElementById('pv-notas').value.trim(),
  };
  if(id){
    const idx=S.proveedores.findIndex(x=>x.id===id);
    if(idx>=0) S.proveedores[idx]={...S.proveedores[idx],...data};
  } else {
    S.proveedores.push({id:Date.now().toString(),...data});
  }
  save();cm();render();
}

function deletePv(id){
  if(!confirm('¿Eliminar este proveedor?'))return;
  S.proveedores=(S.proveedores||[]).filter(x=>x.id!==id);
  save();cm();render();
}

// ======= AGREGAR / ELIMINAR DEPTO =======
function openAddDepto(){
  document.getElementById('mtitle').textContent='Agregar departamento';
  document.getElementById('mbody').innerHTML=`
    <div class="fg2">
      <div class="fi"><label class="fl2">Edificio / Zona</label><input id="nd-group" placeholder="Ej: Vilela, Maipu, MDQ..." list="nd-group-list">
        <datalist id="nd-group-list">${[...new Set(S.deptos.map(d=>d.group))].map(g=>`<option value="${g}">`).join('')}</datalist>
      </div>
      <div class="fi"><label class="fl2">Identificador del depto</label><input id="nd-label" placeholder="Ej: 2A, 1B, PH, 6001..."></div>
    </div>
    <p style="font-size:12px;color:var(--tx2)">Si el edificio ya existe, aparecerá como sugerencia. Podés crear uno nuevo escribiendo el nombre.</p>`;
  document.getElementById('mft').innerHTML=`<button class="btn" onclick="cm()">Cancelar</button><button class="btn btn-p" onclick="confirmAddDepto()"><i class="ti ti-plus"></i> Agregar</button>`;
  document.getElementById('modal').style.display='flex';
}

function confirmAddDepto(){
  const group=document.getElementById('nd-group').value.trim();
  const label=document.getElementById('nd-label').value.trim();
  if(!group||!label){alert('Completá el edificio y el identificador.');return;}
  const id=group.toLowerCase().replace(/\s+/g,'-')+'-'+label.toLowerCase().replace(/\s+/g,'-');
  if(S.deptos.find(d=>d.id===id)){alert('Ya existe ese departamento.');return;}
  S.deptos.push(makeDepto(id, label, group));
  save();cm();render();updateBadge();
}

function deleteDepto(id){
  if(!confirm('¿Eliminar este departamento? Esta acción no se puede deshacer.'))return;
  S.deptos=S.deptos.filter(d=>d.id!==id);
  save();cm();render();updateBadge();
}

// ======= INIT =======
// Firebase auth listener in startListening() handles everything.
// initState() is a no-op stub kept for compatibility.
initState();
// sv('dashboard') is called after Firebase loads data in startListening()
</script>
</body>
